name: Build GSTFlow Android APK

on:
  workflow_dispatch:
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Compile F# to TypeScript (Fable)
        run: |
          dotnet tool restore
          dotnet fable GSTFlow.Wasm -o playground/src/fable --lang ts

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Flutter App
        run: |
          mkdir -p flutter_app
          cd flutter_app
          flutter create . --project-name gstflow

      - name: Compile F# to Dart
        run: |
          dotnet tool restore
          dotnet fable GSTFlow.Core -o flutter_app/lib/fable/Core --lang dart
          dotnet fable GSTFlow.Rules -o flutter_app/lib/fable/Rules --lang dart

      - name: Build Flutter APK
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-Debug
          path: playground/android/app/build/outputs/apk/debug/app-debug.apk

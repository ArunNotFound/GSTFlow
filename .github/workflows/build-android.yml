name: Build GSTFlow Android APK

on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build F# Engine to NativeAOT (Android arm64)
        run: |
          dotnet workload install android
          dotnet publish GSTFlow.NativeExports -c Release -r android-arm64
          mkdir -p flutter_app/android/app/src/main/jniLibs/arm64-v8a
          cp GSTFlow.NativeExports/bin/Release/net10.0/android-arm64/publish/GSTFlow.NativeExports.so flutter_app/android/app/src/main/jniLibs/arm64-v8a/libgstflow.so

      - name: Build Flutter APK
        working-directory: flutter_app
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

name: Build GSTFlow Android APK

on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compile F# to Dart
        run: |
          dotnet tool restore
          dotnet fable GSTFlow.Dart -o flutter_app/lib/fable_dart --lang dart
          mkdir -p flutter_app/lib/fable_dart/fable_modules/fable_library
          cat << 'EOF' > flutter_app/lib/fable_dart/fable_modules/fable_library/Decimal.dart
          import 'dart:math';
          double fromParts(int low, int mid, int high, bool isNegative, int scale) {
            double val = low.toDouble();
            if (scale > 0) val = val / pow(10, scale);
            return isNegative ? -val : val;
          }
          double op_Addition(double x, double y) => x + y;
          double op_Subtraction(double x, double y) => x - y;
          double op_Multiply(double x, double y) => x * y;
          double op_Division(double x, double y) => x / y;
          double op_Modulus(double x, double y) => x % y;
          double round(double x, int scale) => double.parse(x.toStringAsFixed(scale));
          double abs(double x) => x.abs();
          double default_(int x) => 0.0;
          EOF

      - name: Build Flutter APK
        working-directory: flutter_app
        run: |
          flutter pub get
          dart test
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-Android-APK
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for manual release (e.g. v1.0.0)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-dotnet:
    name: Build .NET Windows Artifacts
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Build GSTFlow CLI (win-x64)
        run: dotnet publish GSTFlow.Cli/GSTFlow.Cli.fsproj -c Release -r win-x64 --self-contained true -o ./publish/cli

      - name: Build GSTFlow UI (win-x64)
        run: dotnet publish GSTFlow.UI/GSTFlow.UI.fsproj -c Release -r win-x64 --self-contained true -o ./publish/ui

      - name: Package CLI
        working-directory: ./publish/cli
        run: Compress-Archive -Path * -DestinationPath ../../GSTFlow-CLI-win-x64.zip
        
      - name: Package UI
        working-directory: ./publish/ui
        run: Compress-Archive -Path * -DestinationPath ../../GSTFlow-UI-win-x64.zip

      - name: Upload CLI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-CLI-win-x64
          path: GSTFlow-CLI-win-x64.zip

      - name: Upload UI Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTFlow-UI-win-x64
          path: GSTFlow-UI-win-x64.zip

  publish:
    name: Publish Release
    needs: [build-dotnet]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI Artifact
        uses: actions/download-artifact@v4
        with:
          name: GSTFlow-CLI-win-x64
          path: artifacts/

      - name: Download UI Artifact
        uses: actions/download-artifact@v4
        with:
          name: GSTFlow-UI-win-x64
          path: artifacts/

      - name: Extract Tag Name
        id: extract_tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag_name=${{ github.event.inputs.tag_name }}" >> $GITHUB_ENV
          else
            echo "tag_name=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          name: Release ${{ env.tag_name }}
          files: |
            artifacts/*.zip
          draft: false
          prerelease: false
